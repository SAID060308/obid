<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Monitoring | Kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            min-height: 100vh;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo .logo-icon {
            width: 70px;
            height: 70px;
            background: var(--gradient-1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .auth-logo .logo-icon i {
            font-size: 2rem;
            color: white;
        }

        .auth-logo h4 {
            font-weight: 700;
            color: #1e1e2f;
            margin-bottom: 0.3rem;
        }

        .auth-logo p {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
            background: white;
        }

        .input-group .form-control {
            border-right: none;
            border-radius: 12px 0 0 12px;
        }

        .input-group .btn-outline-secondary {
            border: 2px solid #e9ecef;
            border-left: none;
            border-radius: 0 12px 12px 0;
            background: #f8f9fa;
            color: #6c757d;
            transition: all 0.3s;
        }

        .input-group .btn-outline-secondary:hover {
            background: #e9ecef;
        }

        .btn-login {
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            transition: all 0.3s;
            width: 100%;
            color: white;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
            color: white;
        }

        .divider {
            text-align: center;
            color: #adb5bd;
            font-size: 0.85rem;
            margin: 1.2rem 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e9ecef;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .register-link {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .alert-error {
            background: #fff0f3;
            border: 1px solid #ffb3c1;
            color: #c9184a;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
        <div class="logo-icon">
            <i class="bi bi-tree-fill"></i>
        </div>
        <h4>Eco Monitoring</h4>
        <p>Tizimga kirish uchun ma'lumotlaringizni kiriting</p>
    </div>

    <!-- Error -->
    <div th:if="${param.error}" class="alert-error">
        <i class="bi bi-exclamation-circle-fill"></i>
        Username yoki parol noto'g'ri!
    </div>

    <!-- Success after register -->
    <div th:if="${param.registered}"
         style="background:#f0fff4; border:1px solid #b7efc5; color:#2d6a4f;
                    border-radius:12px; padding:12px 16px; font-size:0.9rem;
                    margin-bottom:1.2rem; display:flex; align-items:center; gap:8px;">
        <i class="bi bi-check-circle-fill"></i>
        Ro'yxatdan muvaffaqiyatli o'tdingiz! Endi kiring.
    </div>

    <!-- Form -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-person me-1"></i>Username
            </label>
            <input type="text" class="form-control" name="username"
                   placeholder="username kiriting" required autofocus>
        </div>

        <div class="mb-4">
            <label class="form-label">
                <i class="bi bi-lock me-1"></i>Parol
            </label>
            <div class="input-group">
                <input type="password" class="form-control" name="password"
                       id="passwordInput" placeholder="parol kiriting" required>
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePassword()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Kirish
        </button>
    </form>

    <div class="divider">yoki</div>

    <div class="register-link">
        Hisobingiz yo'qmi? <a href="/register">Ro'yxatdan o'ting</a>
    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
