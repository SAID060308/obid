<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Monitoring | Email tasdiqlash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            min-height: 100vh;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1rem;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verify-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
            animation: bounce 1s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .verify-icon i {
            font-size: 2.2rem;
            color: white;
        }

        .verify-title {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .verify-title h4 {
            font-weight: 700;
            color: #1e1e2f;
        }

        .verify-title p {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .email-badge {
            background: #f0f4ff;
            border: 1px solid #d0d9ff;
            color: #667eea;
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin: 0.5rem 0 1.5rem;
        }

        /* OTP Input */
        .otp-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 50px;
            height: 58px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s;
            color: #1e1e2f;
        }

        .otp-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
            background: white;
            outline: none;
        }

        .otp-input.filled {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .btn-verify {
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            width: 100%;
            color: white;
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
            color: white;
        }

        .btn-verify:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .resend-section {
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .resend-section button {
            background: none;
            border: none;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            font-size: 0.9rem;
        }

        .resend-section button:disabled {
            color: #adb5bd;
            cursor: not-allowed;
        }

        .alert-error {
            background: #fff0f3;
            border: 1px solid #ffb3c1;
            color: #c9184a;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-success {
            background: #f0fff4;
            border: 1px solid #b7efc5;
            color: #2d6a4f;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Timer */
        .timer {
            font-weight: 600;
            color: #667eea;
        }

        .timer.expired {
            color: #f72585;
        }
    </style>
</head>
<body>
<div class="auth-card">

    <!-- Icon -->
    <div class="verify-icon">
        <i class="bi bi-envelope-check-fill"></i>
    </div>

    <!-- Title -->
    <div class="verify-title">
        <h4>Emailni tasdiqlang</h4>
        <p>Quyidagi emailga 6 xonali kod yuborildi:</p>
        <span class="email-badge" th:text="${email}">email@example.com</span>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="alert-error">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Success (resend) -->
    <div th:if="${success}" class="alert-success">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${success}"></span>
    </div>

    <!-- OTP Form -->
    <form th:action="@{/verify}" method="post" id="verifyForm">
        <input type="hidden" name="email" th:value="${email}">
        <input type="hidden" name="code" id="hiddenCode">

        <!-- OTP Inputs -->
        <div class="otp-container">
            <input type="text" class="otp-input" maxlength="1"
                   id="otp0" oninput="moveNext(this, 0)">
            <input type="text" class="otp-input" maxlength="1"
                   id="otp1" oninput="moveNext(this, 1)">
            <input type="text" class="otp-input" maxlength="1"
                   id="otp2" oninput="moveNext(this, 2)">
            <input type="text" class="otp-input" maxlength="1"
                   id="otp3" oninput="moveNext(this, 3)">
            <input type="text" class="otp-input" maxlength="1"
                   id="otp4" oninput="moveNext(this, 4)">
            <input type="text" class="otp-input" maxlength="1"
                   id="otp5" oninput="moveNext(this, 5)">
        </div>

        <button type="submit" class="btn-verify" id="verifyBtn" disabled>
            <i class="bi bi-shield-check me-2"></i>Tasdiqlash
        </button>
    </form>

    <!-- Resend + Timer -->
    <div class="resend-section">
        <p>Kod kelmadimi?
        <form th:action="@{/resend-code}" method="post" style="display:inline">
            <input type="hidden" name="email" th:value="${email}">
            <button type="submit" id="resendBtn" disabled>
                Qayta yuborish
            </button>
        </form>
        </p>
        <p>Kod amal qilish vaqti: <span class="timer" id="timer">10:00</span></p>
    </div>
</div>

<script>
    // OTP input logic
    function moveNext(input, index) {
        input.value = input.value.replace(/[^0-9]/g, '');

        if (input.value.length === 1) {
            input.classList.add('filled');
            if (index < 5) {
                document.getElementById('otp' + (index + 1)).focus();
            }
        } else {
            input.classList.remove('filled');
        }

        // Barcha inputlar to'lganini tekshirish
        checkComplete();
    }

    function checkComplete() {
        let code = '';
        for (let i = 0; i < 6; i++) {
            code += document.getElementById('otp' + i).value;
        }

        const verifyBtn = document.getElementById('verifyBtn');
        if (code.length === 6) {
            document.getElementById('hiddenCode').value = code;
            verifyBtn.disabled = false;
        } else {
            verifyBtn.disabled = true;
        }
    }

    // Backspace bilan orqaga qaytish
    document.querySelectorAll('.otp-input').forEach((input, index) => {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !this.value && index > 0) {
                document.getElementById('otp' + (index - 1)).focus();
            }
        });

        // Paste qilish imkoniyati
        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const paste = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
            for (let i = 0; i < 6 && i < paste.length; i++) {
                const el = document.getElementById('otp' + i);
                el.value = paste[i];
                el.classList.add('filled');
            }
            checkComplete();
        });
    });

    // Timer — 10 daqiqa
    let timeLeft = 600;
    const timerEl = document.getElementById('timer');
    const resendBtn = document.getElementById('resendBtn');

    const countdown = setInterval(() => {
        timeLeft--;
        const min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const sec = (timeLeft % 60).toString().padStart(2, '0');
        timerEl.textContent = min + ':' + sec;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerEl.textContent = 'Muddati tugadi!';
            timerEl.classList.add('expired');
            resendBtn.disabled = false;
        }
    }, 1000);

    // Resend bosilganda timer qayta boshlansin
    document.querySelector('form[action="/resend-code"]')
        .addEventListener('submit', function() {
            timeLeft = 600;
            timerEl.classList.remove('expired');
            resendBtn.disabled = true;
        });

    // Birinchi inputga focus
    document.getElementById('otp0').focus();
</script>
</body>
</html>
